spring:
  application:
    name: admin-document-processing

  datasource:
    url: jdbc:h2:file:./data/admin-processing;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        globally_quoted_identifiers: true
        format_sql: true

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

server:
  port: 8080

app:
  storage:
    incoming: ./data/incoming
    processed: ./data/processed
    failed: ./data/failed
  watcher:
    poll-interval-ms: 15000
  blocked-operations-filename: blocked_operations.csv

integration:
  signature:
    mock: true
    base-url: http://localhost:9091
  notification:
    mock: true
    base-url: http://localhost:9092

logging:
  level:
    com.bde.adminprocessing: INFO
    org.springframework.batch: INFO
