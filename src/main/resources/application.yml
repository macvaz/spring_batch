spring:
  application:
    name: admin-document-processing

  profiles:
    default: local

  jpa:
    show-sql: false

  batch:
    job:
      enabled: false

server:
  port: 8080

app:
  storage:
    incoming: ./data/incoming
    processed: ./data/processed
    failed: ./data/failed
  watcher:
    poll-interval-ms: 15000
  blocked-operations-filename: blocked_operations.csv

integration:
  signature:
    mock: true
    base-url: http://localhost:9091
  notification:
    mock: true
    base-url: http://localhost:9092

logging:
  level:
    com.bde.adminprocessing: INFO
    org.springframework.batch: INFO
