# Local development — embedded H2 (file-based).
# Activate: SPRING_PROFILES_ACTIVE=local  (also the default profile when none is set)

spring:
  datasource:
    url: jdbc:h2:file:./data/admin-processing;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    properties:
      hibernate:
        globally_quoted_identifiers: true
        format_sql: true

  sql:
    init:
      mode: always
      data-locations: classpath:data/dimensional-data.sql

  batch:
    jdbc:
      initialize-schema: always

app:
  fixtures:
    enabled: false
