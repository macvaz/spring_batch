# Optional profile: file-based H2 with dimensional seed data for local exploration.
# Run: ./gradlew bootRun --args='--spring.profiles.active=dev'

spring:
  datasource:
    url: jdbc:h2:file:./data/dev-admin-processing;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE

  jpa:
    defer-datasource-initialization: true

  sql:
    init:
      mode: always
      data-locations: classpath:data/dimensional-data.sql

  h2:
    console:
      enabled: true

app:
  fixtures:
    enabled: false
