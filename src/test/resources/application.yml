spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
    properties:
      hibernate:
        globally_quoted_identifiers: true

  sql:
    init:
      mode: always
      data-locations: classpath:data/dimensional-data.sql

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

  h2:
    console:
      enabled: true

app:
  storage:
    incoming: ${java.io.tmpdir}/admin-incoming
    processed: ${java.io.tmpdir}/admin-processed
    failed: ${java.io.tmpdir}/admin-failed
  watcher:
    poll-interval-ms: 3600000
  fixtures:
    enabled: false

integration:
  signature:
    mock: true
  notification:
    mock: true
